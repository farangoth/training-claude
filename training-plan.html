const GH_HEADS = { Authorization: "token " + GH_TOKEN, "Content-Type": "application/json" };

async function ghGet(path) {
  try {
    const r = await fetch(GH_API + "/" + path, { headers: GH_HEADS });
    if (!r.ok) return null;
    const d = await r.json();
    return { content: atob(d.content.replace(/\n/g, "")), sha: d.sha };
  } catch(e) { return null; }
}

async function ghPut(path, content, sha, message) {
  try {
    const body = { message: message, content: btoa(unescape(encodeURIComponent(content))) };
    if (sha) body.sha = sha;
    const r = await fetch(GH_API + "/" + path, { method: "PUT", headers: GH_HEADS, body: JSON.stringify(body) });
    if (!r.ok) return null;
    const d = await r.json();
    return d.content ? d.content.sha : null;
  } catch(e) { return null; }
}

async function fetchCoachComment(day, result) {
  try {
    var prompt = "You are an elite running coach. Analyse this completed training session for Clement, an experienced trail runner targeting the Snowdon SkyRace (38km/3150m+) on 15 Aug 2026.\n\nSession: " + day.label + " on " + day.date + "\nPlanned: " + JSON.stringify(day.preDetail) + "\nActual: " + JSON.stringify(result) + "\n\nWrite a 2-3 sentence coaching debrief. Be direct and specific to the data. End with one tactical instruction for the next session. No generic praise.";
    var resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    });
    var data = await resp.json();
    return (data.content && data.content[0] && data.content[0].text) || "Analysis unavailable.";
  } catch(e) { return "Analysis unavailable."; }
}

var TYPE_STYLES = {
  done:     { bg: "rgba(74,222,128,0.09)",  border: "#4ade80", accent: "#4ade80" },
  easy:     { bg: "rgba(96,165,250,0.08)",  border: "#60a5fa", accent: "#60a5fa" },
  strength: { bg: "rgba(245,158,11,0.08)",  border: "#f59e0b", accent: "#f59e0b" },
  rest:     { bg: "rgba(167,139,250,0.07)", border: "#a78bfa", accent: "#a78bfa" },
  long:     { bg: "rgba(249,115,22,0.09)",  border: "#f97316", accent: "#f97316" }
};
var PHASE_COLORS = ["#60a5fa", "#f97316", "#a78bfa"];
var PHASE_LABELS = ["Aerobic Rebuild", "Vertical Loading", "Taper / Race"];

function Tag(props) {
  return (
    <span style={{ fontSize: "0.58rem", fontWeight: 700, letterSpacing: "0.1em", color: props.color, border: "1px solid " + props.color, borderRadius: 3, padding: "1px 6px", fontFamily: "monospace" }}>
      {props.label}
    </span>
  );
}

function StatBox(props) {
  return (
    <div style={{ background: "#12151f", borderRadius: 8, padding: "0.7rem 0.5rem", textAlign: "center", border: "1px solid #1e2535" }}>
      <div style={{ fontSize: "0.55rem", color: "#64748b", letterSpacing: "0.08em", fontFamily: "monospace", marginBottom: 4 }}>{props.label}</div>
      <div style={{ fontSize: "0.88rem", fontWeight: 700, color: "#f1f5f9" }}>{props.value}</div>
    </div>
  );
}

function SyncBadge(props) {
  var cfg = props.status === "synced"  ? { color: "#4ade80", label: "GitHub synced" }
          : props.status === "syncing" ? { color: "#f59e0b", label: "syncing..." }
          : props.status === "error"   ? { color: "#f87171", label: "sync error" }
          :                              { color: "#64748b", label: "local only" };
  return (
    <span style={{ fontSize: "0.55rem", fontFamily: "monospace", color: cfg.color, border: "1px solid " + cfg.color + "40", borderRadius: 3, padding: "2px 6px" }}>
      {cfg.label}
    </span>
  );
}

function LogForm(props) {
  var day = props.day;
  var onSubmit = props.onSubmit;
  var onCancel = props.onCancel;
  var s = TYPE_STYLES[day.type] || TYPE_STYLES.easy;
  var [form, setForm] = useState({ distance: "", duration: "", elevation: "", avgHR: "", peakHR: "", notes: "" });
  var inp = { background: "#12151f", border: "1px solid #1e2535", borderRadius: 6, padding: "0.5rem 0.75rem", color: "#f1f5f9", fontSize: "0.83rem", width: "100%", boxSizing: "border-box", fontFamily: "inherit" };
  function set(k, v) { setForm(function(f) { var n = Object.assign({}, f); n[k] = v; return n; }); }
  var fields1 = [["Distance (km)", "distance"], ["Duration", "duration"], ["Elevation (m+)", "elevation"]];
  var fields2 = [["Avg HR (bpm)", "avgHR"], ["Peak HR (bpm)", "peakHR"]];
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
      <div style={{ fontSize: "0.6rem", color: s.accent, letterSpacing: "0.1em", fontFamily: "monospace", fontWeight: 700 }}>LOG THIS SESSION</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0.5rem" }}>
        {fields1.map(function(pair) {
          return (
            <div key={pair[1]}>
              <div style={{ fontSize: "0.55rem", color: "#64748b", fontFamily: "monospace", marginBottom: 3 }}>{pair[0]}</div>
              <input style={inp} value={form[pair[1]]} onChange={function(e) { set(pair[1], e.target.value); }} placeholder="---" />
            </div>
          );
        })}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.5rem" }}>
        {fields2.map(function(pair) {
          return (
            <div key={pair[1]}>
              <div style={{ fontSize: "0.55rem", color: "#64748b", fontFamily: "monospace", marginBottom: 3 }}>{pair[0]}</div>
              <input style={inp} value={form[pair[1]]} onChange={function(e) { set(pair[1], e.target.value); }} placeholder="---" />
            </div>
          );
        })}
      </div>
      <div>
        <div style={{ fontSize: "0.55rem", color: "#64748b", fontFamily: "monospace", marginBottom: 3 }}>NOTES</div>
        <textarea style={{ background: "#12151f", border: "1px solid #1e2535", borderRadius: 6, padding: "0.5rem 0.75rem", color: "#f1f5f9", fontSize: "0.83rem", width: "100%", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical", minHeight: 60 }} value={form.notes} onChange={function(e) { set("notes", e.target.value); }} placeholder="How did it feel? Any issues?" />
      </div>
      <div style={{ display: "flex", gap: "0.5rem" }}>
        <button onClick={function() { onSubmit(form); }} style={{ flex: 1, background: s.accent, border: "none", borderRadius: 6, padding: "0.6rem", fontWeight: 700, fontSize: "0.8rem", color: "#080b12", cursor: "pointer" }}>Mark Complete</button>
        <button onClick={onCancel} style={{ background: "transparent", border: "1px solid #334155", borderRadius: 6, padding: "0.6rem 1rem", color: "#64748b", fontSize: "0.8rem", cursor: "pointer" }}>Cancel</button>
      </div>
    </div>
  );
}

function DayModal(props) {
  var day = props.day;
  var sessionData = props.sessionData;
  var onClose = props.onClose;
  var onLog = props.onLog;
  var onUnlog = props.onUnlog;
  var s = TYPE_STYLES[day.type] || TYPE_STYLES.easy;
  var isCompleted = !!(sessionData && sessionData.completed);
  var [showLog, setShowLog] = useState(false);
  var [aiComment, setAiComment] = useState((sessionData && sessionData.aiComment) || null);
  var [loadingAI, setLoadingAI] = useState(false);
  var d = day.preDetail;
  var result = (sessionData && sessionData.result) || day.result;

  async function handleSubmit(form) {
    setLoadingAI(true);
    setShowLog(false);
    var comment = await fetchCoachComment(day, form);
    setAiComment(comment);
    var merged = Object.assign({}, form, { aiComment: comment });
    onLog(merged);
    setLoadingAI(false);
  }

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: "1rem" }}>
      <div onClick={function(e) { e.stopPropagation(); }} style={{ background: "#0d1018", border: "1px solid " + s.border, borderRadius: 14, padding: "2rem", maxWidth: 580, width: "100%", maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "1.5rem" }}>
          <div>
            <div style={{ fontSize: "0.6rem", letterSpacing: "0.12em", color: s.accent, fontFamily: "monospace", marginBottom: 5 }}>{day.day} - {day.date}</div>
            <div style={{ fontSize: "1.15rem", fontWeight: 800, color: "#f1f5f9", lineHeight: 1.2 }}>{(d && d.title) || day.label}</div>
            {isCompleted && <div style={{ marginTop: 4 }}><Tag label="COMPLETED" color="#4ade80" /></div>}
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#475569", fontSize: "1.5rem", cursor: "pointer" }}>X</button>
        </div>

        {isCompleted && result ? (
          <div>
            <div style={{ marginBottom: "1rem" }}>
              <div style={{ fontSize: "0.6rem", color: "#4ade80", letterSpacing: "0.1em", fontFamily: "monospace", fontWeight: 700, marginBottom: 8 }}>ACTUAL RESULTS</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "0.6rem" }}>
                {[["Distance", result.distance], ["Duration", result.duration], ["Elevation", result.elevation], ["Avg HR", result.avgHR], ["Peak HR", result.peakHR], ["Avg Power", result.avgWatts], ["Cadence/RPE", result.cadence]].filter(function(p) { return !!p[1]; }).map(function(p) {
                  return <StatBox key={p[0]} label={p[0]} value={p[1]} />;
                })}
              </div>
            </div>
            {result.notes && (
              <div style={{ marginBottom: "1rem" }}>
                <div style={{ fontSize: "0.6rem", color: "#64748b", letterSpacing: "0.08em", fontFamily: "monospace", marginBottom: 4 }}>YOUR NOTES</div>
                <div style={{ fontSize: "0.83rem", color: "#94a3b8", lineHeight: 1.6, fontStyle: "italic" }}>"{result.notes}"</div>
              </div>
            )}
            <div style={{ background: "rgba(74,222,128,0.07)", border: "1px solid rgba(74,222,128,0.25)", borderRadius: 10, padding: "1rem 1.1rem", marginBottom: "1rem" }}>
              <div style={{ fontSize: "0.6rem", color: "#4ade80", letterSpacing: "0.1em", fontFamily: "monospace", fontWeight: 700, marginBottom: 6 }}>COACH DEBRIEF</div>
              {loadingAI
                ? <div style={{ fontSize: "0.83rem", color: "#64748b", fontStyle: "italic" }}>Analysing your session...</div>
                : <div style={{ fontSize: "0.84rem", color: "#f1f5f9", lineHeight: 1.7 }}>{aiComment || (result && result.comment) || "No coaching comment yet."}</div>
              }
            </div>
            <button onClick={onUnlog} style={{ background: "transparent", border: "1px solid #334155", borderRadius: 6, padding: "0.5rem 1rem", color: "#64748b", fontSize: "0.75rem", cursor: "pointer" }}>Undo - mark incomplete</button>
          </div>
        ) : (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "0.6rem", marginBottom: "1.25rem" }}>
              {[["Distance", d && d.distance], ["Duration", d && d.duration], ["Elevation", d && d.elevation]].filter(function(p) { return p[1] && p[1] !== "---"; }).map(function(p) {
                return <StatBox key={p[0]} label={p[0]} value={p[1]} />;
              })}
            </div>
            {[["HR Target", d && d.hrTarget], ["Shoes", d && d.shoes], ["Terrain", d && d.terrain], ["Pack", d && d.pack], ["Nutrition", d && d.nutrition], ["Safety", d && d.safety]].filter(function(p) { return p[1] && p[1] !== "---"; }).map(function(p) {
              return (
                <div key={p[0]} style={{ marginBottom: "0.9rem" }}>
                  <div style={{ fontSize: "0.58rem", color: s.accent, letterSpacing: "0.1em", fontFamily: "monospace", fontWeight: 700, marginBottom: 3 }}>{p[0]}</div>
                  <div style={{ fontSize: "0.83rem", color: "#cbd5e1", lineHeight: 1.6 }}>{p[1]}</div>
                </div>
              );
            })}
            {d && d.routes && d.routes.length > 0 && (
              <div style={{ marginBottom: "0.9rem" }}>
                <div style={{ fontSize: "0.58rem", color: s.accent, letterSpacing: "0.1em", fontFamily: "monospace", fontWeight: 700, marginBottom: 6 }}>ROUTE OPTIONS</div>
                {d.routes.map(function(r, i) {
                  return (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: 5 }}>
                      <span style={{ color: s.accent, fontFamily: "monospace", fontSize: "0.65rem", marginTop: 2, flexShrink: 0 }}>&gt;</span>
                      <span style={{ fontSize: "0.82rem", color: "#cbd5e1", lineHeight: 1.5 }}>{r}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {d && (d.strengthFocus || d.mobilityWork) && (
              <div style={{ marginBottom: "0.9rem" }}>
                <div style={{ fontSize: "0.58rem", color: s.accent, letterSpacing: "0.1em", fontFamily: "monospace", fontWeight: 700, marginBottom: 6 }}>{d.strengthFocus ? "STRENGTH CIRCUIT" : "MOBILITY CIRCUIT"}</div>
                {(d.strengthFocus || d.mobilityWork).map(function(ex, i) {
                  return (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: 5 }}>
                      <span style={{ color: s.accent, fontFamily: "monospace", fontSize: "0.65rem", minWidth: 18 }}>{String(i + 1).padStart(2, "0")}</span>
                      <span style={{ fontSize: "0.82rem", color: "#cbd5e1", lineHeight: 1.4 }}>{ex}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {d && d.keyFocus && !showLog && (
              <div style={{ background: s.bg, border: "1px solid " + s.border, borderRadius: 8, padding: "0.9rem 1rem", marginBottom: "1.25rem" }}>
                <div style={{ fontSize: "0.58rem", color: s.accent, letterSpacing: "0.1em", fontFamily: "monospace", fontWeight: 700, marginBottom: 4 }}>COACH NOTE</div>
                <div style={{ fontSize: "0.83rem", color: "#f1f5f9", lineHeight: 1.6 }}>{d.keyFocus}</div>
              </div>
            )}
            {showLog
              ? <LogForm day={day} onSubmit={handleSubmit} onCancel={function() { setShowLog(false); }} />
              : <button onClick={function() { setShowLog(true); }} style={{ width: "100%", background: s.accent, border: "none", borderRadius: 8, padding: "0.75rem", fontWeight: 700, fontSize: "0.85rem", color: "#080b12", cursor: "pointer", marginTop: 4 }}>Mark as Complete</button>
            }
            {loadingAI && <div style={{ textAlign: "center", marginTop: "1rem", fontSize: "0.8rem", color: "#64748b", fontStyle: "italic" }}>Getting coach analysis...</div>}
          </div>
        )}
      </div>
    </div>
  );
}

function DayTile(props) {
  var day = props.day;
  var sessionData = props.sessionData;
  var onClick = props.onClick;
  var isCompleted = !!(sessionData && sessionData.completed);
  var s = TYPE_STYLES[isCompleted ? "done" : day.type] || TYPE_STYLES.easy;
  var result = (sessionData && sessionData.result) || day.result;
  var [hovered, setHovered] = useState(false);
  var summaryText = isCompleted && result
    ? [result.distance, result.duration, result.elevation].filter(Boolean).join(" - ")
    : day.summary;

  return (
    <button
      onClick={onClick}
      onMouseEnter={function() { setHovered(true); }}
      onMouseLeave={function() { setHovered(false); }}
      style={{
        all: "unset", cursor: "pointer", display: "flex", flexDirection: "column",
        background: s.bg,
        border: "1px solid " + (hovered || isCompleted ? s.border : "#1a2030"),
        borderRadius: 10, padding: "1rem", gap: "0.45rem",
        transition: "all 0.18s ease", textAlign: "left", position: "relative",
        overflow: "hidden", minHeight: 130,
        transform: hovered ? "translateY(-2px)" : "translateY(0)"
      }}
    >
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: s.border, borderRadius: "10px 10px 0 0" }} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <span style={{ fontSize: "0.72rem", fontWeight: 700, color: "#94a3b8", fontFamily: "monospace" }}>{day.day}</span>
          <span style={{ fontSize: "0.62rem", color: "#475569", fontFamily: "monospace", marginLeft: 6 }}>{day.date}</span>
        </div>
        <span style={{ fontSize: "0.65rem", fontWeight: 700, color: s.accent, fontFamily: "monospace" }}>{isCompleted ? "DONE" : day.emoji}</span>
      </div>
      <div style={{ fontSize: "0.85rem", fontWeight: 700, color: isCompleted ? "#4ade80" : "#f1f5f9", lineHeight: 1.2 }}>{day.label}</div>
      <div style={{ fontSize: "0.68rem", color: isCompleted ? "#4ade80" : "#64748b", lineHeight: 1.4, fontFamily: "monospace" }}>{summaryText}</div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "auto", paddingTop: 4 }}>
        <Tag label={isCompleted ? "DONE" : day.tag} color={s.accent} />
        <span style={{ fontSize: "0.58rem", color: "#2a3548", fontFamily: "monospace" }}>tap</span>
      </div>
    </button>
  );
}

function ProgressBar(props) {
  var days = props.days;
  var weekSessions = props.weekSessions;
  var completable = days.filter(function(d) { return d.type !== "rest"; }).length;
  var done = days.filter(function(d) { return weekSessions[d.day + d.date] && weekSessions[d.day + d.date].completed; }).length;
  var pct = completable > 0 ? Math.round((done / completable) * 100) : 0;
  var barColor = pct === 100 ? "#4ade80" : pct >= 60 ? "#f97316" : "#60a5fa";
  return (
    <div style={{ marginBottom: "1.5rem" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontSize: "0.6rem", color: "#64748b", fontFamily: "monospace", letterSpacing: "0.08em" }}>WEEK PROGRESS</span>
        <span style={{ fontSize: "0.7rem", fontWeight: 700, color: barColor, fontFamily: "monospace" }}>{done}/{completable} sessions - {pct}%</span>
      </div>
      <div style={{ height: 6, background: "#1a2030", borderRadius: 99, overflow: "hidden" }}>
        <div style={{ height: "100%", width: pct + "%", background: barColor, borderRadius: 99, transition: "width 0.5s ease" }} />
      </div>
    </div>
  );
}

function WeekSelector(props) {
  var weeks = props.weeks;
  var currentIdx = props.currentIdx;
  var onSelect = props.onSelect;
  return (
    <div style={{ display: "flex", gap: "0.35rem", flexWrap: "wrap", marginBottom: "1.5rem" }}>
      {weeks.map(function(w, i) {
        var pc = PHASE_COLORS[w.phase - 1];
        var isActive = i === currentIdx;
        return (
          <button key={i} onClick={function() { onSelect(i); }} style={{ all: "unset", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", padding: "0.45rem 0.65rem", borderRadius: 7, border: "1px solid " + (isActive ? pc : "#1e2535"), background: isActive ? pc + "18" : "transparent", transition: "all 0.15s ease", minWidth: 44 }}>
            <span style={{ fontSize: "0.6rem", fontWeight: 700, color: isActive ? pc : "#475569", fontFamily: "monospace" }}>W{w.number}</span>
            <span style={{ fontSize: "0.5rem", color: isActive ? pc : "#334155", fontFamily: "monospace", textAlign: "center", lineHeight: 1.2, marginTop: 2 }}>{w.block.split(" ")[0]}</span>
          </button>
        );
      })}
    </div>
  );
}

function CountdownBadge() {
  var diff = Math.ceil((new Date("2026-08-15") - new Date()) / (1000 * 60 * 60 * 24));
  var color = diff <= 7 ? "#f97316" : diff <= 21 ? "#f59e0b" : "#60a5fa";
  return (
    <div style={{ textAlign: "right" }}>
      <div style={{ fontSize: "0.55rem", color: "#475569", fontFamily: "monospace", letterSpacing: "0.08em", marginBottom: 3 }}>RACE DAY</div>
      <div style={{ fontSize: "2rem", fontWeight: 900, color: color, letterSpacing: "-0.03em", lineHeight: 1 }}>{diff}</div>
      <div style={{ fontSize: "0.6rem", color: "#475569", fontFamily: "monospace" }}>days</div>
    </div>
  );
}

function App() {
  var [weekIdx, setWeekIdx] = useState(0);
  var [selected, setSelected] = useState(null);
  var [sessions, setSessions] = useState({});
  var [sessionsSha, setSessionsSha] = useState(null);
  var [syncStatus, setSyncStatus] = useState("syncing");

  function seedCompleted(base) {
    var out = Object.assign({}, base);
    WEEKS.forEach(function(w) {
      w.days.forEach(function(d) {
        if (d.type === "done" && d.result) {
          var k = "w" + w.number + "_" + d.day + d.date;
          if (!out[k]) out[k] = { completed: true, result: d.result, aiComment: d.result.comment };
        }
      });
    });
    return out;
  }

  useEffect(function() {
    (async function() {
      setSyncStatus("syncing");
      try {
        var res = await ghGet("sessions.json");
        if (res) {
          setSessions(seedCompleted(JSON.parse(res.content)));
          setSessionsSha(res.sha);
          setSyncStatus("synced");
        } else {
          setSessions(seedCompleted({}));
          setSyncStatus("synced");
        }
      } catch(e) {
        setSessions(seedCompleted(lsGet()));
        setSyncStatus("offline");
      }
    })();
  }, []);

  var week = WEEKS[weekIdx];
  var phaseColor = PHASE_COLORS[week.phase - 1];
  function sessionKey(day) { return "w" + week.number + "_" + day.day + day.date; }

  async function persistSessions(updated) {
    lsSet(updated);
    setSyncStatus("syncing");
    try {
      var newSha = await ghPut("sessions.json", JSON.stringify(updated, null, 2), sessionsSha, "Update session completions");
      if (newSha) { setSessionsSha(newSha); setSyncStatus("synced"); }
      else setSyncStatus("error");
    } catch(e) { setSyncStatus("error"); }
  }

  function handleLog(day, formData) {
    var key = sessionKey(day);
    var updated = Object.assign({}, sessions);
    updated[key] = { completed: true, result: formData, aiComment: formData.aiComment };
    setSessions(updated);
    persistSessions(updated);
  }

  function handleUnlog(day) {
    var key = sessionKey(day);
    var updated = Object.assign({}, sessions);
    delete updated[key];
    setSessions(updated);
    persistSessions(updated);
  }

  var weekSessions = {};
  week.days.forEach(function(d) { weekSessions[d.day + d.date] = sessions[sessionKey(d)]; });

  return (
    <div style={{ minHeight: "100vh", background: "#080b12", color: "#f1f5f9", fontFamily: "Inter, system-ui, sans-serif", padding: "1.75rem 1.5rem", maxWidth: 940, margin: "0 auto" }}>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "1.5rem", flexWrap: "wrap", gap: "0.75rem" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: 6 }}>
            <div style={{ fontSize: "0.58rem", letterSpacing: "0.15em", color: "#f97316", fontFamily: "monospace", fontWeight: 700 }}>SNOWDON SKYRACE - 15 AUG 2026</div>
            <SyncBadge status={syncStatus} />
          </div>
          <h1 style={{ margin: 0, fontSize: "1.55rem", fontWeight: 800, letterSpacing: "-0.02em", lineHeight: 1.1 }}>
            Week {week.number} <span style={{ color: phaseColor }}>{week.block}</span>
          </h1>
          <div style={{ fontSize: "0.75rem", color: "#475569", marginTop: 5, fontFamily: "monospace" }}>{week.dates}</div>
        </div>
        <CountdownBadge />
      </div>

      <div style={{ display: "flex", gap: "0.4rem", marginBottom: "0.6rem" }}>
        {PHASE_LABELS.map(function(l, i) {
          var bg = week.phase - 1 === i ? PHASE_COLORS[i] : week.phase - 1 > i ? PHASE_COLORS[i] + "60" : "#1e2535";
          return <div key={i} style={{ flex: 1, height: 3, borderRadius: 99, background: bg }} />;
        })}
      </div>
      <div style={{ display: "flex", gap: "1rem", marginBottom: "1.5rem" }}>
        {PHASE_LABELS.map(function(l, i) {
          return <span key={i} style={{ fontSize: "0.55rem", color: week.phase - 1 === i ? PHASE_COLORS[i] : "#334155", fontFamily: "monospace", letterSpacing: "0.06em", fontWeight: week.phase - 1 === i ? 700 : 400 }}>{l}</span>;
        })}
      </div>

      <WeekSelector weeks={WEEKS} currentIdx={weekIdx} onSelect={setWeekIdx} />
      <ProgressBar days={week.days} weekSessions={weekSessions} />

      <div style={{ background: phaseColor + "09", border: "1px solid " + phaseColor + "30", borderRadius: 10, padding: "1.1rem 1.4rem", marginBottom: "1.5rem" }}>
        <div style={{ fontSize: "0.58rem", color: phaseColor, letterSpacing: "0.12em", fontFamily: "monospace", fontWeight: 700, marginBottom: 7 }}>WEEK OBJECTIVE</div>
        <p style={{ margin: 0, fontSize: "0.85rem", color: "#cbd5e1", lineHeight: 1.7 }}>{week.objective}</p>
        <div style={{ display: "flex", gap: "0.6rem", marginTop: "0.9rem", flexWrap: "wrap" }}>
          {[["Volume", week.totalKm], ["Elevation", week.totalElev], ["Intensity", week.intensity], ["Strength", week.strength], ["HR Cap", week.hrCap + " bpm"]].map(function(p) {
            return (
              <div key={p[0]} style={{ background: "#0a0d14", border: "1px solid #1a2030", borderRadius: 6, padding: "0.35rem 0.7rem" }}>
                <div style={{ fontSize: "0.52rem", color: "#475569", fontFamily: "monospace", letterSpacing: "0.07em" }}>{p[0]}</div>
                <div style={{ fontSize: "0.78rem", fontWeight: 700, color: "#f1f5f9" }}>{p[1]}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(185px, 1fr))", gap: "0.8rem", marginBottom: "1.75rem" }}>
        {week.days.map(function(day, i) {
          return <DayTile key={i} day={day} sessionData={sessions[sessionKey(day)]} onClick={function() { setSelected(day); }} />;
        })}
      </div>

      <div style={{ background: "rgba(249,115,22,0.05)", border: "1px solid rgba(249,115,22,0.18)", borderRadius: 10, padding: "1.1rem 1.4rem" }}>
        <div style={{ fontSize: "0.58rem", color: "#f97316", letterSpacing: "0.12em", fontFamily: "monospace", fontWeight: 700, marginBottom: "0.9rem" }}>GLOBAL RECOMMENDATIONS - WEEK {week.number}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: "0.55rem" }}>
          {week.recommendations.map(function(r, i) {
            return (
              <div key={i} style={{ display: "flex", gap: "0.7rem" }}>
                <span style={{ color: "#f97316", fontFamily: "monospace", fontSize: "0.65rem", marginTop: 2, flexShrink: 0 }}>{String(i + 1).padStart(2, "0")}</span>
                <span style={{ fontSize: "0.81rem", color: "#cbd5e1", lineHeight: 1.6 }}>{r}</span>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: "1.1rem", paddingTop: "0.9rem", borderTop: "1px solid rgba(249,115,22,0.12)", display: "flex", alignItems: "center", gap: "0.75rem" }}>
          <div>
            <div style={{ fontSize: "0.58rem", color: "#f97316", fontFamily: "monospace", letterSpacing: "0.07em" }}>TARGET</div>
            <div style={{ fontSize: "0.8rem", fontWeight: 700, color: "#f1f5f9" }}>Snowdon SkyRace - 15 Aug 2026 - 38 km / 3,150 m+</div>
            <div style={{ fontSize: "0.65rem", color: "#475569", fontFamily: "monospace" }}>Week {week.number} of 7 - {PHASE_LABELS[week.phase - 1]}</div>
          </div>
        </div>
      </div>

      {selected && (
        <DayModal
          day={selected}
          sessionData={sessions[sessionKey(selected)]}
          onClose={function() { setSelected(null); }}
          onLog={function(data) { handleLog(selected, data); setSelected(null); }}
          onUnlog={function() { handleUnlog(selected); setSelected(null); }}
        />
      )}
    </div>
  );
}


const { useState, useEffect } = React;
ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
