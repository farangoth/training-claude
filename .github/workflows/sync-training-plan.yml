name: Sync Training Plan HTML

on:
  push:
    paths:
      - 'training-plan.jsx'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Babel
        run: npm install @babel/core @babel/preset-react @babel/preset-env @babel/cli --save-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build training-plan.html
        run: |
          python3 - << 'PYEOF'
          import re, subprocess, sys, os

          with open('training-plan.jsx', 'r', encoding='utf-8') as f:
              jsx = f.read()

          jsx_body = '\n'.join(l for l in jsx.split('\n') if not l.startswith('import '))

          jsx_body = jsx_body.replace(
              'const STORAGE_KEY = "clement_training_v2";',
              'const STORAGE_KEY = "clement_training_v2";\nif (!window._trainingStore) window._trainingStore = {};'
          )
          jsx_body = re.sub(
              r'function loadState\(\) \{[^}]+\}',
              'function loadState() {\n  try { return window._trainingStore[STORAGE_KEY] ? JSON.parse(window._trainingStore[STORAGE_KEY]) : null; } catch { return null; }\n}',
              jsx_body
          )
          jsx_body = re.sub(
              r'function saveState\(s\) \{[^}]+\}',
              'function saveState(s) {\n  try { window._trainingStore[STORAGE_KEY] = JSON.stringify(s); } catch {}\n}',
              jsx_body
          )
          jsx_body = jsx_body.replace('export default function App() {', 'function App() {')
          jsx_body = '/* React globals from CDN */\nvar useState = React.useState;\nvar useEffect = React.useEffect;\n\n' + jsx_body
          jsx_body += "\n\nReactDOM.render(React.createElement(App, null), document.getElementById('root'));"

          with open('/tmp/_input.jsx', 'w', encoding='utf-8') as f:
              f.write(jsx_body)

          with open('/tmp/babel.config.json', 'w') as f:
              f.write('{"presets":[["@babel/preset-react",{"runtime":"classic"}],["@babel/preset-env",{"targets":{"chrome":"90","firefox":"90","safari":"14"},"modules":false}]]}')

          babel = 'node_modules/.bin/babel'
          result = subprocess.run(
              [babel, '/tmp/_input.jsx', '--config-file', '/tmp/babel.config.json', '--out-file', '/tmp/_compiled.js'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print('Babel FAILED:'); print(result.stderr); sys.exit(1)

          with open('/tmp/_compiled.js', 'r', encoding='utf-8') as f:
              compiled = f.read()
          compiled = re.sub(r'^export\s+', '', compiled, flags=re.MULTILINE)
          print(f'Compiled: {len(compiled.encode())//1024} KB')

          html = (
              '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">'
              '<meta name="viewport" content="width=device-width, initial-scale=1.0">'
              '<title>Training Plan</title>'
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>'
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>'
              '<style>*{box-sizing:border-box}body{margin:0;padding:0;background:#080b12}'
              '#root{min-height:100vh}input,textarea,button,select{font-family:inherit}'
              '::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#0d1018}'
              '::-webkit-scrollbar-thumb{background:#1e2535;border-radius:3px}'
              '::-webkit-scrollbar-thumb:hover{background:#2d3748}</style>'
              '</head><body>'
              '<div id="root"><div style="display:flex;align-items:center;justify-content:center;'
              'height:100vh;background:#080b12;color:#475569;font-family:monospace;font-size:13px;">'
              'LOADING...</div></div>'
              '<script>\n' + compiled + '\n</script></body></html>'
          )

          with open('training-plan.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print(f'Built: {len(html.encode())//1024} KB')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add training-plan.html
          git diff --staged --quiet || git commit -m "auto: rebuild training-plan.html [skip ci]"
          git push
