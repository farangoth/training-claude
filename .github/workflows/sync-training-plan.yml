name: Sync Training Plan HTML

on:
  push:
    paths:
      - 'training-plan.jsx'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Babel
        run: npm install @babel/core @babel/preset-react @babel/preset-env @babel/cli --save-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build training-plan.html (pre-compiled JS)
        run: python3 scripts/build_training_html.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add training-plan.html
          git diff --staged --quiet || git commit -m "auto: rebuild training-plan.html (pre-compiled JS) [skip ci]"
          git push
